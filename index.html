<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南澳岛旅游</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="section-hero">
        <div class="hero-content">
            <h1>南澳岛大桥</h1>
            <p>探索北回归线上的明珠</p>
        </div>

        <div class="wave-container-top">
            <img src="image/小人1号.png" class="vector-top-right" alt="装饰插画">
            <svg class="wave-svg" viewBox="0 0 1440 120" preserveAspectRatio="none">
                <path d="M0,64L48,69.3C96,75,192,85,288,80C384,75,480,53,576,42.7C672,32,768,32,864,48C960,64,1056,96,1152,96C1248,96,1344,64,1392,48L1440,32L1440,120L1392,120C1344,120,1248,120,1152,120C1056,120,960,120,864,120C768,120,672,120,576,120C480,120,384,120,288,120C192,120,96,120,48,120L0,120Z" fill="#E0F7FA"></path>
            </svg>
        </div>
    </section>

    <section class="section-intro">
        <div class="container intro-flex">
            <div class="intro-text">
                <h2 class="styled-title">南澳岛</h2>
                <p class="desc">南澳岛位于广东省汕头市，是该省唯一的海岛县，也是中国大陆唯一穿越北回归线的海岛。其以“蓝天、碧海、绿岛、金沙、白浪”著称，拥有青澳湾（东方夏威夷）、长山尾灯塔、三囱崖灯塔和南澳大桥等绝美景观，适合环岛自驾与吃海鲜，是国家AAAA级旅游景区。这里是归隐海岛的理想之地...</p>
            </div>
            <div class="map-wrapper">
                <img src="image/map.png" class="cartoon-map" alt="卡通地图">
            </div>
        </div>
        <img src="image/小人2号.png" class="vector-overlap-left" alt="装饰插画">
        <div class="wave-container-bottom">
            <svg class="wave-svg" viewBox="0 0 1440 120" preserveAspectRatio="none">
                <path d="M0,32L60,42.7C120,53,240,75,360,74.7C480,75,600,53,720,48C840,43,960,53,1080,58.7C1200,64,1320,64,1380,64L1440,64L1440,120L1380,120C1320,120,1200,120,1080,120C960,120,840,120,720,120C600,120,480,120,360,120C240,120,120,120,60,120L0,120Z" fill="#0097A7"></path>
            </svg>
        </div>
    </section>

    <section class="section-spots">
        <div class="container spots-layout">
            <div class="spots-header">
                <p class="white-label">著名景点</p>
            </div>

            <div class="card-grid">
                <div class="card card-1">
                    <div class="card-top" style="background-image: url('image/自然之门.jpeg');"></div>
                    <div class="card-bottom">自然之门广场</div>
                </div>
                <div class="card card-2">
                    <div class="card-top" style="background-image: url('image/东方夏威夷·青澳湾.jpg');">
                        <div class="loc-tag"></div> </div>
                    <div class="card-bottom">东方夏威夷·青澳湾</div>
                </div>
                <div class="card card-3">
                    <div class="card-top" style="background-image: url('image/三囱崖灯塔.jpg');"></div>
                    <div class="card-bottom">三囱崖冰淇淋灯塔</div>
                </div>
                <div class="card card-4">
                    <div class="card-top" style="background-image: url('image/风车山.jpeg');">
                        <div class="loc-tag"></div> </div>
                    <div class="card-bottom">风车山</div>
                </div>
            </div>

            <div class="notice-bar">
                <span class="notice-title">notice</span>
                <div class="notice-links">
                    <a href="https://www.weather.com.cn/weather/101280504.shtml">南澳岛天气</a>
                    <a href="https://hk.trip.com/toplist/tripbest/nan-ao-best-must-visit-restaurants-100900015226/">南澳岛美食</a>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
